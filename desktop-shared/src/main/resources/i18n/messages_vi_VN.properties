settings.hardware.acceleration.vrr.hint.message=Màn hình của bạn dường như đang sử dụng tốc độ làm mới cao, có thể được ghép nối với G-Sync hoặc FreeSync. Một số người dùng gặp hiện tượng nhấp nháy hoặc tốc độ khung hình thất thường khi sử dụng kết xuất tăng tốc phần cứng trong cấu hình này. Bạn có muốn chuyển sang kết xuất phần mềm không? (Yêu cầu khởi động lại)
