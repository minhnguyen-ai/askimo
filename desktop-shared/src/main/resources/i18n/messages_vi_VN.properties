# Onboarding Step 1: Analytics
onboarding.step.analytics.title=Giúp Askimo tốt hơn cho mọi người
onboarding.step.analytics.description=Askimo là miễn phí và mã nguồn mở. Chia sẻ dữ liệu sử dụng ẩn danh là cách đóng góp nhỏ bé. Nó giúp chúng tôi biết tính năng nào nên phát triển tiếp theo.
