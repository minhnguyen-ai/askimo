# Onboarding Step 1: Welcome
onboarding.step.welcome.title=👋 Chào mừng đến với Askimo!
onboarding.step.welcome.description=Trợ lý AI cá nhân cho bạn. Trò chuyện với nhiều mô hình AI, tổ chức tri thức trong dự án, và tự động hóa công việc với kỹ năng và kế hoạch.
onboarding.step.welcome.feature1.title=💬 Chat với AI
onboarding.step.welcome.feature1.description=Đặt câu hỏi, nhận trợ giúp cho công việc hoặc trò chuyện với bất kỳ mô hình AI nào.
onboarding.step.welcome.feature2.title=📁 Tổ chức bằng dự án
onboarding.step.welcome.feature2.description=Nhóm các cuộc trò chuyện và đính kèm các nguồn tri thức để AI luôn có ngữ cảnh phù hợp.
onboarding.step.welcome.feature3.title=⚡ Tự động hóa bằng Kỹ năng & Kế hoạch
onboarding.step.welcome.feature3.description=Tạo quy trình AI tái sử dụng và các kế hoạch nhiều bước tự động chạy.

# Onboarding Step 2: Profile
onboarding.step.profile.title=Hãy cho chúng tôi biết về bạn
onboarding.step.profile.description=Hồ sơ của bạn giúp Askimo cá nhân hóa phản hồi AI theo nền tảng và nhu cầu của bạn. Bạn có thể cập nhật bất cứ lúc nào trong Cài đặt.
onboarding.step.profile.name.label=Tên của bạn
onboarding.step.profile.name.placeholder=Jane Smith
onboarding.step.profile.occupation.label=Nghề nghiệp (tùy chọn)
onboarding.step.profile.occupation.placeholder=Kỹ sư phần mềm, Nhà nghiên cứu, Thiết kế…

# Onboarding Step 3: Directives
onboarding.step.directives.title=✨ Mọi câu trả lời đều phù hợp với bạn
onboarding.step.directives.description=Viết một hướng dẫn ngắn, AI sẽ làm theo suốt cuộc trò chuyện. Không cần nhắc lại, không phải lặp lại.
onboarding.step.directives.feature1.title=AI suy nghĩ như bạn
onboarding.step.directives.feature1.description=Hãy nói một lần vai trò, quy tắc, định dạng mong muốn. Mọi phản hồi đều tự động theo chỉ dẫn đó, từ đầu đến cuối.
onboarding.step.directives.feature2.title=Nhận đúng câu trả lời bạn mong muốn
onboarding.step.directives.feature2.description=Câu hỏi mơ hồ thì câu trả lời cũng mơ hồ. Chỉ dẫn như "trả lời bằng gạch đầu dòng, tối đa 5 dòng" sẽ biến AI thành chuyên gia theo cách bạn nghĩ.
onboarding.step.directives.feature3.title=Chuyên gia phù hợp cho từng công việc
onboarding.step.directives.feature3.description=Cần gia sư kiên nhẫn để học và người review code thẳng thắn khi debug? Giữ chỉ dẫn riêng biệt để AI vào đúng vai cho từng nhiệm vụ.
onboarding.step.directives.link=Xem ví dụ và mẹo

# Onboarding Step 6: Ready
onboarding.step.ready.title=🚀 Mọi thứ đã sẵn sàng!
onboarding.step.ready.description=Bạn đã cấu hình xong. Hãy bắt đầu chat đầu tiên hoặc khám phá các tài nguyên bên dưới.
onboarding.step.ready.link.docs=📚 Xem tài liệu
onboarding.step.ready.link.providers=🔧 Cấu hình nhà cung cấp AI
onboarding.step.ready.link.github=⭐ Star cho chúng tôi trên GitHub

# Onboarding Step 5: Persona
onboarding.step.persona.title=🎯 Bạn chủ yếu muốn làm gì?
onboarding.step.persona.description=Chọn tùy chọn nghe giống công việc của bạn nhất. Askimo sẽ hiển thị các tính năng phù hợp nhất. Bạn luôn có thể thay đổi điều này từ menu Xem.
onboarding.step.persona.developer.description=Đọc và viết mã, tái cấu trúc tệp, tạo giàn giáo (scaffolding) hoặc chạy các tác vụ đại lý trên dự án cục bộ của bạn.
onboarding.step.persona.developer.features=Kích hoạt: Skills (Gemini CLI, Claude Code), Projects
onboarding.step.persona.researcher.description=Nghiên cứu các chủ đề, phân tích dữ liệu, viết báo cáo có cấu trúc và nhận câu trả lời dựa trên kiến thức.
onboarding.step.persona.researcher.features=Kích hoạt: Plans, Projects (RAG)
onboarding.step.persona.manager.description=Soạn thảo email, xử lý ghi chú cuộc họp, viết báo cáo trạng thái hoặc chạy quy trình làm việc nội dung nhiều bước.
onboarding.step.persona.manager.features=Kích hoạt: Plans
onboarding.step.persona.everything.description=Tôi làm nhiều việc kết hợp — hãy cho tôi xem tất cả các tính năng và tôi sẽ quyết định sử dụng gì.
onboarding.step.persona.everything.features=Kích hoạt: Skills, Plans, Projects, MCP, RAG

