error.invalid_request=⚠️ 無効なリクエスト：{details}\n\n入力内容を確認して、もう一度お試しください。
error.system=⚠️ システムエラー\n\n予期しないエラーが発生しました：{errorCode}\n\nAskimo サポートへ次を添えてご連絡ください：\n• 実行していた操作\n• 上記のエラーコード\n• タイムスタンプ

