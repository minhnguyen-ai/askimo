onboarding.step.persona.description=Escolha a opção que mais se parece com o seu trabalho. O Askimo mostrará os recursos mais relevantes. Você pode alterar isso a qualquer momento no menu Exibir.
onboarding.step.persona.developer.description=Ler e escrever código, refatorar arquivos, gerar scaffolding ou executar tarefas agênticas em seu projeto local.
onboarding.step.persona.developer.features=Ativa: Skills (Gemini CLI, Claude Code), Projects
onboarding.step.persona.researcher.description=Pesquisar tópicos, analisar dados, escrever relatórios estruturados e obter respostas baseadas em conhecimento.
onboarding.step.persona.researcher.features=Ativa: Plans, Projects (RAG)
onboarding.step.persona.manager.description=Rascunhar e-mails, processar notas de reuniões, escrever relatórios de status ou executar fluxos de trabalho de conteúdo em várias etapas.
onboarding.step.persona.manager.features=Ativa: Plans
onboarding.step.persona.everything.description=Eu faço uma mistura de coisas — mostre-me todos os recursos e decidirei o que usar.
onboarding.step.persona.everything.features=Ativa: Skills, Plans, Projects, MCP, RAG

