# Onboarding Step 1: Welcome
onboarding.step.welcome.title=👋 Bienvenue sur Askimo !
onboarding.step.welcome.description=Votre assistant IA personnel. Discutez avec plusieurs modèles IA, organisez vos connaissances en projets, et automatisez des workflows avec des skills et des plans.
onboarding.step.welcome.feature1.title=💬 Discutez avec l’IA
onboarding.step.welcome.feature1.description=Posez des questions, obtenez de l’aide pour des tâches ou discutez avec n’importe quel modèle IA.
onboarding.step.welcome.feature2.title=📁 Organisez avec des projets
onboarding.step.welcome.feature2.description=Groupez les discussions et attachez des sources de connaissance pour que l’IA dispose toujours du bon contexte.
onboarding.step.welcome.feature3.title=⚡ Automatisez avec Skills & Plans
onboarding.step.welcome.feature3.description=Créez des workflows IA réutilisables et des plans multi-étapes qui s’exécutent automatiquement.

# Onboarding Step 2: Profile
onboarding.step.profile.title=Parlez-nous de vous
onboarding.step.profile.description=Votre profil aide Askimo à personnaliser les réponses IA selon votre expérience et vos besoins. Vous pouvez le modifier à tout moment dans les Paramètres.
onboarding.step.profile.name.label=Votre nom
onboarding.step.profile.name.placeholder=Jane Smith
onboarding.step.profile.occupation.label=Profession (optionnel)
onboarding.step.profile.occupation.placeholder=Ingénieur logiciel, Chercheur, Designer…

# Onboarding Step 3: Directives
onboarding.step.directives.title=✨ Faites que chaque réponse travaille pour vous
onboarding.step.directives.description=Rédigez une courte instruction et l’IA la suivra durant toute la conversation. Pas besoin de répéter. Pas de répétition inutile.
onboarding.step.directives.feature1.title=L’IA pense comme vous
onboarding.step.directives.feature1.description=Indiquez une fois votre rôle, vos règles, votre format préféré. Toutes les réponses les suivent automatiquement, du premier message au dernier.
onboarding.step.directives.feature2.title=Obtenez la réponse que vous voulez vraiment
onboarding.step.directives.feature2.description=Des questions vagues produisent des réponses vagues. Une instruction comme « répondre en listes à puces, max 5 lignes » transforme une IA générique en un spécialiste à votre image.
onboarding.step.directives.feature3.title=Le bon expert pour chaque tâche
onboarding.step.directives.feature3.description=Besoin d’un tuteur patient pour apprendre et d’un relecteur de code direct pour le débogage ? Gardez des instructions séparées et obtenez l’état d’esprit adapté à chaque tâche.
onboarding.step.directives.link=Voir exemples et astuces

