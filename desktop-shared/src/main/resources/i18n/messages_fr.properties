# Onboarding Step 5: Persona
onboarding.step.persona.title=🎯 Que voulez-vous faire principalement ?
onboarding.step.persona.description=Choisissez l'option qui ressemble le plus à votre travail. Askimo affichera les fonctionnalités les plus pertinentes. Vous pourrez toujours modifier cela depuis le menu Affichage.
onboarding.step.persona.developer.description=Lire et écrire du code, remanier des fichiers, générer des structures ou exécuter des tâches agentiques sur votre projet local.
onboarding.step.persona.developer.features=Active : Skills (Gemini CLI, Claude Code), Projects
onboarding.step.persona.researcher.description=Rechercher des sujets, analyser des données, rédiger des rapports structurés et obtenir des réponses basées sur les connaissances.
onboarding.step.persona.researcher.features=Active : Plans, Projects (RAG)
onboarding.step.persona.manager.description=Rédiger des e-mails, traiter des notes de réunion, écrire des rapports d'état ou exécuter des flux de travail de contenu en plusieurs étapes.
onboarding.step.persona.manager.features=Active : Plans
onboarding.step.persona.everything.description=Je fais un mélange de choses — montrez-moi toutes les fonctionnalités et je déciderai quoi utiliser.
onboarding.step.persona.everything.features=Active : Skills, Plans, Projects, MCP, RAG

