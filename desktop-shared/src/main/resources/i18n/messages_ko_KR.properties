onboarding.step.welcome.feature2.title=📁 프로젝트로 체계화
onboarding.step.welcome.feature2.description=채팅을 그룹으로 묶어 지식 출처도 연결하여 AI가 항상 올바른 맥락을 가집니다.
onboarding.step.welcome.feature3.title=⚡ 스킬과 플랜으로 자동화
onboarding.step.welcome.feature3.description=반복 사용 가능한 AI 워크플로우와 자동 단계 플랜을 만들 수 있습니다.

# Onboarding Step 2: Profile
onboarding.step.profile.title=본인에 대해 알려주세요
onboarding.step.profile.description=프로필 정보는 Askimo가 당신의 배경과 필요에 맞춰 AI 응답을 개인화하는 데 도움을 줍니다. 설정에서 언제든 수정할 수 있습니다.
onboarding.step.profile.name.label=이름
onboarding.step.profile.name.placeholder=Jane Smith
onboarding.step.profile.occupation.label=직업 (선택사항)
onboarding.step.profile.occupation.placeholder=소프트웨어 엔지니어, 연구원, 디자이너…

# Onboarding Step 3: Directives
onboarding.step.directives.title=✨ 모든 응답을 내 방식대로
onboarding.step.directives.description=간단한 지시 한 번이면 대화 내내 AI가 따릅니다. 재설명이나 반복할 필요가 없습니다.
onboarding.step.directives.feature1.title=AI가 내 방식대로 생각합니다
onboarding.step.directives.feature1.description=역할, 규칙, 선호하는 형식 한 번만 알려주면, 그 뒤 모든 응답이 자동으로 이를 따릅니다.
onboarding.step.directives.feature2.title=원하는 답을 정확히 받으세요
onboarding.step.directives.feature2.description=모호한 질문엔 모호한 답이 옵니다. "최대 5줄, 불릿포인트로 답변" 같은 지시로 AI를 당신의 스타일 전문가로 만들 수 있습니다.
onboarding.step.directives.feature3.title=작업별로 적합한 전문가
onboarding.step.directives.feature3.description=학습엔 친절한 튜터, 디버깅땐 직설적 코드 리뷰어가 필요하신가요? 별도 지시문을 사용해 작업에 맞는 역할을 분리할 수 있습니다.
onboarding.step.directives.link=예시와 팁 보기

# Onboarding Step 6: Ready
onboarding.step.ready.title=🚀 준비 완료!
onboarding.step.ready.description=모든 설정이 완료됐습니다. 첫 채팅을 시작하거나 아래 리소스를 확인해보세요.
onboarding.step.ready.link.docs=📚 문서 보기
onboarding.step.ready.link.providers=🔧 AI 제공업체 설정
onboarding.step.ready.link.github=⭐ GitHub에서 별 주기

# Onboarding Step 5: Persona
onboarding.step.persona.title=🎯 주로 어떤 작업을 하고 싶으신가요?
onboarding.step.persona.description=귀하의 업무와 가장 비슷한 옵션을 선택하세요. Askimo가 가장 관련성 높은 기능을 보여드립니다. 보기 메뉴에서 언제든지 이를 변경할 수 있습니다.
onboarding.step.persona.developer.description=코드 읽기 및 쓰기, 파일 리팩토링, 스캐폴딩 생성 또는 로컬 프로젝트에서 에이전트 작업 실행.
onboarding.step.persona.developer.features=활성화: Skills (Gemini CLI, Claude Code), Projects
onboarding.step.persona.researcher.description=주제 조사, 데이터 분석, 구조화된 보고서 작성 및 지식 기반 답변 얻기.
onboarding.step.persona.researcher.features=활성화: Plans, Projects (RAG)
onboarding.step.persona.manager.description=이메일 초안 작성, 회의록 처리, 상태 보고서 작성 또는 다단계 콘텐츠 워크플로 실행.
onboarding.step.persona.manager.features=활성화: Plans
onboarding.step.persona.everything.description=저는 여러 가지 작업을 혼합하여 합니다 — 모든 기능을 보여주시면 제가 무엇을 사용할지 결정하겠습니다.
onboarding.step.persona.everything.features=활성화: Skills, Plans, Projects, MCP, RAG

