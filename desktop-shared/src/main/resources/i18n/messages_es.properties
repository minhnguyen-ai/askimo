# Onboarding Step 5: Persona
onboarding.step.persona.title=🎯 ¿Qué es lo que principalmente quieres hacer?
onboarding.step.persona.description=Elige la opción que más se parezca a tu trabajo. Askimo mostrará las funciones más relevantes. Siempre puedes cambiar esto desde el menú Ver.
onboarding.step.persona.developer.description=Leer y escribir código, refactorizar archivos, generar andamiajes o ejecutar tareas agénticas en tu proyecto local.
onboarding.step.persona.developer.features=Habilita: Skills (Gemini CLI, Claude Code), Projects
onboarding.step.persona.researcher.description=Investigar temas, analizar datos, escribir informes estructurados y obtener respuestas fundamentadas en el conocimiento.
onboarding.step.persona.researcher.features=Habilita: Plans, Projects (RAG)
onboarding.step.persona.manager.description=Redactar correos electrónicos, procesar notas de reuniones, escribir informes de estado o ejecutar flujos de trabajo de contenido de varios pasos.
onboarding.step.persona.manager.features=Habilita: Plans
onboarding.step.persona.everything.description=Hago una mezcla de cosas — muéstrame todas las funciones y yo decidiré qué usar.
onboarding.step.persona.everything.features=Habilita: Skills, Plans, Projects, MCP, RAG

