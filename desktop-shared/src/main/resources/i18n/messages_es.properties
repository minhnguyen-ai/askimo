# Onboarding Step 3: Directives
onboarding.step.directives.title=✨ Haz que cada respuesta funcione para ti
onboarding.step.directives.description=Escribe una breve instrucción y la IA la seguirá durante toda la conversación. Sin volver a explicar. Sin repeticiones.
onboarding.step.directives.feature1.title=La IA piensa como tú
onboarding.step.directives.feature1.description=Indícale una vez tu rol, tus reglas, tu formato preferido. Cada respuesta sigue tu directiva automáticamente, del primer mensaje al último.
onboarding.step.directives.feature2.title=Obtén la respuesta que realmente quieres
onboarding.step.directives.feature2.description=Preguntas vagas obtienen respuestas vagas. Una directiva como "responde en viñetas, máximo 5 líneas" convierte una IA genérica en un especialista que piensa como tú.
onboarding.step.directives.feature3.title=El experto adecuado para cada tarea
onboarding.step.directives.feature3.description=¿Necesitas un tutor paciente para aprender y un crítico de código directo para depurar? Mantén directivas separadas y obtén la mentalidad adecuada para cada tarea.
onboarding.step.directives.link=Ver ejemplos y consejos

