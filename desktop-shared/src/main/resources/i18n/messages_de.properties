onboarding.step.analytics.collected.no.personal=❌  Keine persönlichen Daten, Dateien oder API-Schlüssel. Niemals.
onboarding.step.analytics.detail=Das hilft uns, die Entwicklung auf das Wesentliche zu konzentrieren. Sie können dies jederzeit unter Einstellungen > Erweitert deaktivieren.
onboarding.step.analytics.toggle.on=Ja, helfe Askimo zu verbessern ❤️
onboarding.step.analytics.toggle.off=Nein danke
onboarding.step.analytics.learn_more=Erfahren Sie mehr über unsere Datenschutzrichtlinie

# Onboarding Step 1: Welcome
onboarding.step.welcome.title=👋 Willkommen bei Askimo!
onboarding.step.welcome.description=Ihr persönlicher KI-Assistent. Chatten Sie mit mehreren KI-Modellen, organisieren Sie Wissen in Projekten und automatisieren Sie Abläufe mit Skills und Plänen.
onboarding.step.welcome.feature1.title=💬 Mit KI chatten
onboarding.step.welcome.feature1.description=Stellen Sie Fragen, lassen Sie sich bei Aufgaben helfen oder führen Sie ein Gespräch mit einem beliebigen KI-Modell.
onboarding.step.welcome.feature2.title=📁 Mit Projekten organisieren
onboarding.step.welcome.feature2.description=Gruppieren Sie Chats und fügen Sie Wissensquellen hinzu, damit die KI immer den richtigen Kontext hat.
onboarding.step.welcome.feature3.title=⚡ Mit Skills & Plänen automatisieren
onboarding.step.welcome.feature3.description=Erstellen Sie wiederverwendbare KI-Workflows und mehrstufige Pläne, die automatisch ablaufen.

# Onboarding Step 2: Profile
onboarding.step.profile.title=Erzählen Sie uns von sich
onboarding.step.profile.description=Ihr Profil hilft Askimo, KI-Antworten auf Ihren Hintergrund und Ihre Bedürfnisse zuzuschneiden. Sie können es jederzeit in den Einstellungen aktualisieren.
onboarding.step.profile.name.label=Ihr Name
onboarding.step.profile.name.placeholder=Jane Smith
onboarding.step.profile.occupation.label=Beruf (optional)
onboarding.step.profile.occupation.placeholder=Softwareentwickler, Forscher, Designer…

# Onboarding Step 3: Directives
onboarding.step.directives.title=✨ Jede Antwort auf Sie zugeschnitten
onboarding.step.directives.description=Schreiben Sie eine kurze Anweisung und die KI folgt ihr für das gesamte Gespräch. Kein Erklären mehrmals. Keine Wiederholungen.
onboarding.step.directives.feature1.title=Die KI denkt wie Sie
onboarding.step.directives.feature1.description=Sagen Sie ihr einmal Ihre Rolle, Ihre Regeln, Ihr bevorzugtes Format. Jede Antwort folgt automatisch – von der ersten bis zur letzten Nachricht.
onboarding.step.directives.feature2.title=Erhalten Sie die Antwort, die Sie wirklich wollen
onboarding.step.directives.feature2.description=Unklare Fragen bringen unklare Antworten. Eine Direktive wie „bitte in Stichpunkten antworten, maximal 5 Zeilen“ macht die KI zu einem Spezialisten, der Ihrer Denkweise entspricht.
onboarding.step.directives.feature3.title=Für jede Aufgabe der richtige Experte
onboarding.step.directives.feature3.description=Benötigen Sie einen geduldigen Tutor zum Lernen und einen direkten Code Reviewer zum Debuggen? Bewahren Sie verschiedene Direktiven getrennt auf und erhalten immer das richtige Mindset für jede Aufgabe.
onboarding.step.directives.link=Beispiele und Tipps ansehen

# Onboarding Step 6: Ready
onboarding.step.ready.title=🚀 Sie sind fertig!
onboarding.step.ready.description=Alles ist eingerichtet und bereit. Starten Sie Ihren ersten Chat oder stöbern Sie in den untenstehenden Ressourcen.
onboarding.step.ready.link.docs=📚 Dokumentation durchsuchen
onboarding.step.ready.link.providers=🔧 KI-Anbieter konfigurieren
onboarding.step.ready.link.github=⭐ Uns auf GitHub favorisieren

# Onboarding Step 5: Persona
onboarding.step.persona.title=🎯 Was möchten Sie hauptsächlich tun?
onboarding.step.persona.description=Wählen Sie die Option, die am ehesten Ihrer Arbeit entspricht. Askimo wird die relevantesten Funktionen anzeigen. Sie können dies jederzeit über das Menü „Ansicht“ ändern.
onboarding.step.persona.developer.description=Code lesen und schreiben, Dateien refaktorieren, Gerüste generieren oder agentische Aufgaben in Ihrem lokalen Projekt ausführen.
onboarding.step.persona.developer.features=Aktiviert: Skills (Gemini CLI, Claude Code), Projects
onboarding.step.persona.researcher.description=Themen recherchieren, Daten analysieren, strukturierte Berichte schreiben und wissensbasierte Antworten erhalten.
onboarding.step.persona.researcher.features=Aktiviert: Plans, Projects (RAG)
onboarding.step.persona.manager.description=E-Mails entwerfen, Besprechungsnotizen verarbeiten, Statusberichte schreiben oder mehrstufige Content-Workflows ausführen.
onboarding.step.persona.manager.features=Aktiviert: Plans
onboarding.step.persona.everything.description=Ich mache eine Mischung aus verschiedenen Dingen — zeigen Sie mir alle Funktionen und ich werde entscheiden, was ich verwende.
onboarding.step.persona.everything.features=Aktiviert: Skills, Plans, Projects, MCP, RAG

