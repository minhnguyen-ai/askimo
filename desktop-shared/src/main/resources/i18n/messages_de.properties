# Onboarding Step 1: Analytics
onboarding.step.analytics.title=Helfen Sie mit, Askimo für alle zu verbessern
onboarding.step.analytics.description=Askimo ist kostenlos und Open Source. Das Teilen anonymer Nutzungsdaten ist ein kleiner Beitrag. Es hilft uns, herauszufinden, was wir als Nächstes bauen sollen.
onboarding.step.analytics.collected.yes.features=✅  Welche Funktionen genutzt werden (z.B. RAG, MCP-Tools, Pläne, Skills)
